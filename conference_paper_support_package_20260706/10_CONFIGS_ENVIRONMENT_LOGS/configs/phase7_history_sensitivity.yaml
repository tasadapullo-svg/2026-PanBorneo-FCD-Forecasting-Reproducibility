project:
  name: PanBorneo_SIRAF_week_forecasting
  random_seed: 20260623

paths:
  window_index: outputs/tables/window_index_all.csv
  panel_1h: data/processed/phase2_panel_1h_model_ready.csv.gz
  phase3_baseline_metrics_by_horizon: outputs/tables/phase3_baseline_metrics_by_horizon.csv
  phase5_deep_vs_baseline_comparison: outputs/tables/phase5_deep_vs_baseline_comparison.csv
  phase6_ablation_vs_speed_only: outputs/tables/phase6_ablation_vs_speed_only.csv
  output_tables: outputs/tables
  output_logs: outputs/logs
  checkpoints: outputs/checkpoints
  reports: reports

task:
  target_variable: speed
  target_column: current_speed
  target_definition: future_window_mean_speed
  input_feature_group: speed_only
  input_features:
    - current_speed
  histories_hours: [24, 72, 168]
  horizons_hours: [1, 3, 6]
  excluded_horizons_hours: [12, 24, 168]
  min_input_observed_ratio: 0.80
  min_target_observed_ratio: 0.80

data:
  window_chunksize: 200000
  max_train_samples: 200000
  max_val_samples: 20000
  max_test_samples: 20000
  num_workers: 0

training:
  model: TCN
  epochs: 15
  early_stopping_patience: 4
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  device: auto

models:
  tcn:
    channels: [32, 32, 32]
    kernel_size: 3
    dropout: 0.1

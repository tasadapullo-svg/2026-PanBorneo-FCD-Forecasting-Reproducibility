project:
  name: PanBorneo_SIRAF_week_forecasting
  random_seed: 20260623

paths:
  window_index: outputs/tables/window_index_all.csv
  panel_1h: data/processed/phase2_panel_1h_model_ready.csv.gz
  phase3_baseline_metrics: outputs/tables/phase3_baseline_metrics.csv
  phase3_baseline_metrics_by_horizon: outputs/tables/phase3_baseline_metrics_by_horizon.csv
  phase4_smoke_metrics: outputs/tables/phase4_smoke_metrics.csv
  output_tables: outputs/tables
  output_logs: outputs/logs
  checkpoints: outputs/checkpoints
  reports: reports

task:
  target_variable: speed
  target_column: current_speed
  target_definition: future_window_mean_speed
  history_hours: [24]
  horizons_hours: [1, 3, 6, 12, 24]
  excluded_horizons_hours: [168]
  min_input_observed_ratio: 0.80
  min_target_observed_ratio: 0.80

data:
  input_features:
    - current_speed
    - missing_mask
    - coverage_ratio_24h
    - volatility_tti_6h
    - hour_of_day
    - day_of_week
    - weekend_flag
  window_chunksize: 200000
  max_train_samples: 200000
  max_val_samples: 20000
  max_test_samples: 20000
  num_workers: 0

training:
  models: [TCN, LSTM]
  epochs: 20
  early_stopping_patience: 5
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  device: auto

models:
  lstm:
    hidden_size: 64
    num_layers: 1
    dropout: 0.0
  tcn:
    channels: [32, 32, 32]
    kernel_size: 3
    dropout: 0.1
